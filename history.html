<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WITIN - History</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/history.css">
</head>
<body>
  <div class="app-container page-history">
    <header class="top-nav">
      <div class="top-nav__icon btn-back">
        <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </div>
      <div class="top-nav__logo">W</div>
      <a href="#" class="top-nav__icon">
        <svg viewBox="0 0 24 24"><path d="M12 22a2 2 0 002-2h-4a2 2 0 002 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
      </a>
    </header>

    <main class="main-content">
      <section class="history-calendar">
        <div class="history-calendar__header">
          <div class="history-calendar__month" id="calendar-month">2026년 3월</div>
          <div class="history-calendar__nav">
            <svg viewBox="0 0 24 24" width="20" height="20"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
            <svg viewBox="0 0 24 24" width="20" height="20"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
          </div>
        </div>
        
        <div class="history-calendar__weekdays">
          <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
        </div>
        <div class="history-calendar__days" id="calendar-days">
          <!-- Rendered by JS -->
        </div>
      </section>
      
      <div class="history-log">
        <!-- JS will populate -->
      </div>
    </main>

    <nav class="bottom-nav">
      <a href="index.html" class="bottom-nav__item">
        <div class="bottom-nav__icon"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></div>
        <div class="bottom-nav__text">홈</div>
      </a>
      <a href="history.html" class="bottom-nav__item bottom-nav__item--active">
        <div class="bottom-nav__icon"><svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7v-5z"/></svg></div>
        <div class="bottom-nav__text">히스토리</div>
      </a>
      <a href="criteria.html" class="bottom-nav__item">
        <div class="bottom-nav__icon"><svg viewBox="0 0 24 24"><path d="M3 17v2h6v-2H3zM3 5v2h10V5H3zm10 16v-2h8v-2h-8v-2h-2v6h2zM7 9v2H3v2h4v2h2V9H7zm14 4v-2H11v2h10zm-6-4h2V7h4V5h-4V3h-2v6z"/></svg></div>
        <div class="bottom-nav__text">기준 조정</div>
      </a>
      <a href="profile.html" class="bottom-nav__item">
        <div class="bottom-nav__icon"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></div>
        <div class="bottom-nav__text">내 정보</div>
      </a>
    </nav>
  </div>

  <script src="js/app-state.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/history.js"></script>
</body>
</html>
