<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WITIN - Result</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/result.css">
</head>
<body>
  <div class="app-container page-result">
    <header class="top-nav">
      <div class="top-nav__icon btn-back">
        <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </div>
      <div class="top-nav__title">결과 상세</div>
      <div class="top-nav__icon"></div>
    </header>

    <main class="main-content">
      <section class="card page-result__top-card">
        <h2 class="page-result__top-title">계산 기준에 따른 결과</h2>
        <div class="gauge-container">
          <svg class="gauge-svg" viewBox="0 0 200 200">
            <circle class="gauge-bg" cx="100" cy="100" r="80"></circle>
            <circle class="gauge-progress" id="result-gauge-progress" cx="100" cy="100" r="80"></circle>
          </svg>
          <div class="page-result__amount" id="result-amount">₩ 0</div>
        </div>
        <div class="page-result__period"><span id="result-period">30일</span> 기준 · 남은 기간 <span class="text-highlight" id="result-remaining">0일</span></div>
      </section>

      <section class="card page-result__details">
        <div class="list-row">
          <div class="list-row__label">기준 기간</div>
          <div class="list-row__value" id="detail-period">30일</div>
        </div>
        <div class="list-row">
          <div class="list-row__label">앞으로 들어올 돈</div>
          <div class="list-row__value" id="detail-incoming">₩ 0</div>
        </div>
        <div class="list-row">
          <div class="list-row__label">앞으로 나갈 돈</div>
          <div class="list-row__value" id="detail-outgoing">- ₩ 0</div>
        </div>
        <div class="list-row">
          <div class="list-row__label">여유 기준 <span id="detail-buffer-level">(평소 수준)</span></div>
          <div class="list-row__value text-highlight" id="detail-buffer">- ₩ 0</div>
        </div>

        <div id="extra-section" class="result-extra-section hidden">
            <div class="result-extra-section__title">이번 기간 반영</div>
            <div class="list-row hidden" id="row-extra-income">
                <div class="list-row__label">추가 수입</div>
                <div class="list-row__value detail-extra-value" id="detail-extra-income">₩ 0</div>
            </div>
            <div class="list-row hidden" id="row-extra-expense">
                <div class="list-row__label">추가 지출</div>
                <div class="list-row__value detail-extra-value" id="detail-extra-expense">- ₩ 0</div>
            </div>
        </div>
      </section>

        <a href="criteria.html" class="btn-primary page-result__btn">
          기준 조정하기
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
        </a>
    </main>

    <nav class="bottom-nav">
      <a href="index.html" class="bottom-nav__item">
        <div class="bottom-nav__icon"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></div>
        <div class="bottom-nav__text">홈</div>
      </a>
      <a href="history.html" class="bottom-nav__item">
        <div class="bottom-nav__icon"><svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7v-5z"/></svg></div>
        <div class="bottom-nav__text">히스토리</div>
      </a>
      <a href="criteria.html" class="bottom-nav__item">
        <div class="bottom-nav__icon"><svg viewBox="0 0 24 24"><path d="M3 17v2h6v-2H3zM3 5v2h10V5H3zm10 16v-2h8v-2h-8v-2h-2v6h2zM7 9v2H3v2h4v2h2V9H7zm14 4v-2H11v2h10zm-6-4h2V7h4V5h-4V3h-2v6z"/></svg></div>
        <div class="bottom-nav__text">기준 조정</div>
      </a>
      <a href="profile.html" class="bottom-nav__item">
        <div class="bottom-nav__icon"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></div>
        <div class="bottom-nav__text">내 정보</div>
      </a>
    </nav>
  </div>

  <script src="js/app-state.js"></script>
  <script src="js/calculator.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/result.js"></script>
</body>
</html>
