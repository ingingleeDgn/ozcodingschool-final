<div class="page-container home-page" style="padding-top: 32px;">
  <!-- 상단 인사 영역 -->
  <div class="section-header" style="margin-bottom: var(--spacing-4);">
    <p id="home-greeting" style="font-size: 14px; font-weight: var(--font-weight-bold); color: var(--color-primary);">김위틴님,</p>
    <p style="font-size: 14px; color: var(--color-text-primary); margin-top: 4px;">오늘 써도 괜찮은 금액</p>
  </div>

  <!-- Safe-to-Spend 금액 -->
  <div class="section" style="margin-bottom: var(--spacing-2);">
    <div id="safe-to-spend-amount" class="text-hero" style="color: var(--color-text-primary); margin-bottom: 8px;">₩0</div>
    <p id="home-subtext" class="text-sub">30일 기준 · 9일 남음</p>
  </div>

  <!-- CTA 버튼 -->
  <div class="section mt-2">
    <button id="btn-explanation" class="btn btn-primary" style="border-radius: var(--radius-full); height: 48px; font-size: 14px; font-weight: var(--font-weight-semibold); justify-content: space-between; padding: 0 24px;">
      <span>이 금액은 이렇게 계산됐어요</span>
      <span style="font-family: monospace;">&gt;</span>
    </button>
  </div>

  <!-- 이번 기간 남은 금액 -->
  <div class="section mt-3">
    <div style="display: flex; justify-content: flex-end; align-items: center; gap: 8px;">
      <span style="font-size: 12px; color: var(--color-text-secondary);">이번 기간 남은 금액</span>
      <span id="remain-total-amount" style="font-size: 12px; color: var(--color-text-primary); font-weight: var(--font-weight-medium);">₩0</span>
    </div>
  </div>

  <!-- 하단 안심 멘트 -->
  <div class="section" style="margin-top: 24px; text-align: center;">
    <p id="home-cheer" style="font-size: 12px; color: var(--color-text-secondary); line-height: 1.5;">
      지금은 무리없이 사용할 수 있어요!<br/>따로 판단하지 않아도 괜찮아요
    </p>
  </div>
</div>
