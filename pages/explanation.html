<div class="page-container explanation-page pb-4" style="padding-top: 16px;">
  
  <!-- 계산 구조 카드 -->
  <div class="card mb-3" style="background: #FFFFFF; border-radius: 16px; padding: 20px; text-align: center; box-shadow: var(--shadow-sm);">
    <p style="font-size: 14px; color: #888888; margin-bottom: 8px;">계산 기준에 따른 결과</p>
    <div id="expl-final" style="font-size: 32px; font-weight: var(--font-weight-bold); color: #111111; margin-bottom: 4px;">₩0</div>
    <p id="expl-criteria-text" style="font-size: 12px; color: #888888;">지정 기간 기준</p>
  </div>
  
  <!-- 기준 기간 섹션 -->

      <div class="flex-between" style="padding-bottom: 16px; border-bottom: 1px solid #F0F0F0;">
        <span id="expl-period-label" style="font-size: 14px; color: var(--color-text-primary);">지정 기간</span>
        <span id="expl-days" style="font-size: 14px; font-weight: var(--font-weight-bold); color: var(--color-primary);">0일</span>
      </div>

      <div class="flex-between" style="padding-bottom: 16px; border-bottom: 1px solid #F0F0F0;">
        <span style="font-size: 14px; color: var(--color-text-primary); display: flex; align-items: center; gap: 4px;">
          현재 잔액
          <svg viewBox="0 0 24 24" width="12" height="12" stroke="#AAAAAA" stroke-width="2" fill="none"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
        </span>
        <span id="expl-balance" style="font-size: 14px; color: var(--color-text-primary);">₩0</span>
      </div>
      
      <div class="flex-between" style="padding-bottom: 16px; border-bottom: 1px solid #F0F0F0;">

          앞으로 들어올 돈
          <svg viewBox="0 0 24 24" width="12" height="12" stroke="#AAAAAA" stroke-width="2" fill="none"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
        </span>
        <span id="expl-income" style="font-size: 14px; color: var(--color-text-primary);">₩0</span>
      </div>
      
      <div class="flex-between" style="padding-bottom: 16px; border-bottom: 1px solid #F0F0F0;">
        <span style="font-size: 14px; color: var(--color-text-primary); display: flex; align-items: center; gap: 4px;">
          앞으로 나갈 돈
          <svg viewBox="0 0 24 24" width="12" height="12" stroke="#AAAAAA" stroke-width="2" fill="none"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
        </span>
        <span id="expl-expense" style="font-size: 14px; color: var(--color-text-primary);">₩0</span>
      </div>
      
      <div class="flex-between" style="padding-bottom: 16px; border-bottom: 1px solid #F0F0F0;">
        <span style="font-size: 14px; color: var(--color-text-primary); display: flex; align-items: center; gap: 4px;">
          여유 기준
          <svg viewBox="0 0 24 24" width="12" height="12" stroke="#AAAAAA" stroke-width="2" fill="none"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
        </span>
        <span id="expl-buffer" style="font-size: 14px; color: var(--color-text-primary);">₩0</span>

    </div>
  </div>
  
  <div class="mt-4">
    <button id="btn-go-criteria" class="btn btn-primary" style="border-radius: var(--radius-full); height: 48px; font-size: 14px; font-weight: var(--font-weight-semibold); justify-content: space-between; padding: 0 24px;">
      <span>기준 조정하기</span>
      <span style="font-family: monospace;">&gt;</span>
    </button>
