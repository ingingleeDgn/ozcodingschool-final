<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WITIN - Data Connections</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/data-connections.css">
</head>
<body>
  <div class="app-container page-data-connections">
    <header class="top-nav">
      <div class="top-nav__icon btn-back">
        <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </div>
      <div class="top-nav__title">데이터 연결 및 검증</div>
      <div class="top-nav__icon" id="btn-reset" title="초기화">
        <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
      </div>
    </header>

    <main class="main-content">
      <p class="data-connections-desc">실제 계산에 사용되는 데이터를 확인하고 수정할 수 있습니다. 저장 시 계산 결과에 즉시 반영됩니다.</p>
      
      <!-- Top Account Summary -->
      <section class="card summary-card top-summary">
        <div class="summary-card__header">
          <h3 class="summary-card__title">연결된 자산 요약</h3>
          <span class="summary-card__time" id="last-sync-time">최근 동기화: -</span>
        </div>
        <div class="summary-card__body">
          <div class="summary-stat">
            <span class="summary-stat__label">연결 계좌</span>
            <span class="summary-stat__value" id="account-count">0개</span>
          </div>
          <div class="summary-stat">
            <span class="summary-stat__label">연결 카드</span>
            <span class="summary-stat__value" id="card-count">0개</span>
          </div>
        </div>
      </section>

      <!-- Schedule Rules -->
      <section class="card pb-0">
        <h3 class="section-title">기준 일정</h3>
        <div id="schedule-list">
          <!-- Rendered by JS -->
        </div>
      </section>

      <!-- Income Items -->
      <section class="card pb-0">
        <div class="section-header">
          <h3 class="section-title">수입 상세</h3>
          <button type="button" class="btn-text" id="btn-add-income">+ 추가</button>
        </div>
        <div id="income-list">
          <!-- Rendered by JS -->
        </div>
      </section>

      <!-- Expense Items -->
      <section class="card pb-0">
        <div class="section-header">
          <h3 class="section-title">지출 상세</h3>
          <button type="button" class="btn-text" id="btn-add-expense">+ 추가</button>
        </div>
        <div id="expense-list">
          <!-- Rendered by JS -->
        </div>
      </section>
      
      <!-- Bottom Summary Card -->
      <section class="card summary-card bottom-summary mt-lg">
        <h3 class="summary-card__title mb-base">계산 요약 미리보기</h3>
        <div class="summary-grid">
          <div class="summary-grid__item">
            <div class="summary-grid__label">현재 기준 기간</div>
            <div class="summary-grid__value" id="summary-period">-</div>
          </div>
          <div class="summary-grid__item">
            <div class="summary-grid__label">남은 일수</div>
            <div class="summary-grid__value" id="summary-days">-일</div>
          </div>
          <div class="summary-grid__item">
            <div class="summary-grid__label">수입 합계</div>
            <div class="summary-grid__value text-primary" id="summary-income">0원</div>
          </div>
          <div class="summary-grid__item">
            <div class="summary-grid__label">지출 합계</div>
            <div class="summary-grid__value text-danger" id="summary-expense">0원</div>
          </div>
          <div class="summary-grid__item full-width mt-2">
            <div class="summary-grid__label">여유 기준</div>
            <div class="summary-grid__value" id="summary-buffer">-</div>
          </div>
        </div>
      </section>
    </main>

    <div class="bottom-panel">
      <button type="button" id="btn-apply" class="btn-primary">변경사항 적용 및 재계산</button>
    </div>

    <!-- Edit Modal Overlay -->
    <div id="edit-modal" class="modal-overlay hidden">
      <div class="modal-card">
        <h3 class="modal-title" id="modal-title">항목 수정</h3>
        
        <div class="input-group-vertical">
          <label>항목명</label>
          <input type="text" id="modal-input-name" class="input-field" placeholder="예: 월급, 통신비">
        </div>
        
        <div class="input-group-vertical" id="modal-group-amount">
          <label>금액</label>
          <div class="input-group">
            <input type="number" id="modal-input-amount" class="input-field" placeholder="금액 입력">
            <span class="input-suffix">원</span>
          </div>
        </div>
        
        <div class="input-group-vertical">
          <label>예정일 (매월)</label>
          <div class="input-group">
            <input type="number" id="modal-input-date" class="input-field" placeholder="1~31 입력" min="1" max="31">
            <span class="input-suffix">일</span>
          </div>
        </div>
        
        <div class="input-group-vertical" id="modal-group-repeat">
          <label class="checkbox-label">
            <input type="checkbox" id="modal-input-repeat"> 
            <span class="checkbox-custom"></span> 매월 반복
          </label>
        </div>

        <div class="modal-actions">
          <button type="button" id="modal-btn-delete" class="btn-text text-danger hidden">삭제</button>
          <div class="spacer"></div>
          <button type="button" id="modal-btn-cancel" class="btn-text text-muted">취소</button>
          <button type="button" id="modal-btn-save" class="btn-text text-primary">저장</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/app-state.js"></script>
  <script src="js/calculator.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/data-connections.js"></script>
</body>
</html>
